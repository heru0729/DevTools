<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevTools Pro - 500 Edition</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9619368699008291" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" id="hljs-theme">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="app-shell">
    <nav class="nav-rail">
        <div class="nav-group">
            <button class="rail-btn active" data-cat="data" title="Data Magic">📦</button>
            <button class="rail-btn" data-cat="security" title="Security">🔐</button>
            <button class="rail-btn" data-cat="frontend" title="Frontend">🎨</button>
            <button class="rail-btn" data-cat="utils" title="Utilities">🛠️</button>
        </div>
        <div class="rail-footer">
            <button id="langSwitcher" class="control-btn">EN</button>
            <button id="themeSwitcher" class="control-btn">🌙</button>
        </div>
    </nav>

    <div class="main-content">
        <aside class="tool-sidebar">
            <div class="search-box">
                <input type="text" id="toolSearch" placeholder="Search (Ctrl + K)...">
            </div>
            <div id="toolList" class="tool-list custom-scroll"></div>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <div class="title-area">
                    <h1 id="activeToolName">---</h1>
                    <p id="activeToolDesc">---</p>
                </div>
                <div class="action-bar-container">
                    <div class="action-bar" id="toolActions"></div>
                    <button id="layoutToggle" class="control-btn" title="Toggle Layout">🌓</button>
                </div>
            </header>

            <div class="mobile-tabs">
                <div class="mobile-tab active" data-target="input">INPUT</div>
                <div class="mobile-tab" data-target="output">OUTPUT</div>
            </div>

            <section class="editor-grid" id="editorGrid">
                <div class="editor-container" id="inputSection">
                    <div class="editor-label">INPUT</div>
                    <textarea id="mainInput" spellcheck="false" placeholder="Paste data here..."></textarea>
                </div>
                <div class="editor-container" id="outputSection">
                    <div class="editor-label">OUTPUT</div>
                    <div class="output-viewer">
                        <div id="imageContainer" class="preview-box"></div>
                        <pre><code id="mainOutput" class="custom-scroll"></code></pre>
                        <button id="copyBtn" class="fab-copy">Copy</button>
                    </div>
                </div>
            </section>

            <div class="ad-footer-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-9619368699008291"
                     data-ad-slot="6699940875"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </main>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
