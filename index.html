<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Pro | All-in-One Developer Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JEW06PPQN4"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JEW06PPQN4');</script>
</head>
<body>

<main class="container">
    <div class="header-flex">
        <h1>DevTools Pro</h1>
        <button id="themeToggle">Light</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="json">JSON/XML</button>
        <button class="tab" data-tab="crypto">Crypto/Hash</button>
        <button class="tab" data-tab="convert">Convert/URL</button>
        <button class="tab" data-tab="time">Time/Unit</button>
        <button class="tab" data-tab="gen">Generator</button>
        <button class="tab" data-tab="api">API/JWT</button>
        <button class="tab" data-tab="diff">Diff</button>
    </div>

    <section class="tab-content active" id="json">
        <textarea id="jsonInput" placeholder="Enter JSON or XML..."></textarea>
        <div class="btn-group">
            <button onclick="formatJSON()">JSON Format</button>
            <button onclick="minifyJSON()">JSON Minify</button>
            <button onclick="escapeHTML()">HTML Escape</button>
            <button onclick="unescapeHTML()">HTML Unescape</button>
        </div>
        <pre id="jsonOutput"></pre>
    </section>

    <section class="tab-content" id="crypto">
        <textarea id="cryptoInput" placeholder="Enter text to hash..."></textarea>
        <div class="btn-group">
            <button onclick="calcHash('MD5')">MD5</button>
            <button onclick="calcHash('SHA256')">SHA256</button>
            <button onclick="calcHash('SHA512')">SHA512</button>
            <button onclick="base64Encode()">Base64 Encode</button>
            <button onclick="base64Decode()">Base64 Decode</button>
        </div>
        <pre id="cryptoOutput"></pre>
    </section>

    <section class="tab-content" id="convert">
        <textarea id="convertInput" placeholder="Enter URL or text..."></textarea>
        <div class="btn-group">
            <button onclick="urlEncode()">URL Encode</button>
            <button onclick="urlDecode()">URL Decode</button>
            <button onclick="parseQuery()">Parse Query Params</button>
            <button onclick="caseUpper()">UPPERCASE</button>
            <button onclick="caseLower()">lowercase</button>
        </div>
        <pre id="convertOutput"></pre>
    </section>

    <section class="tab-content" id="time">
        <input type="text" id="timeInput" placeholder="Unix Timestamp (e.g. 1739832000) or Date String">
        <div class="btn-group">
            <button onclick="unixToDate()">Timestamp → Date</button>
            <button onclick="dateToUnix()">Date → Timestamp</button>
            <button onclick="curUnix()">Current Unix</button>
        </div>
        <pre id="timeOutput"></pre>
    </section>

    <section class="tab-content" id="gen">
        <div class="btn-group">
            <button onclick="genUUID()">Generate UUID v4</button>
            <button onclick="genLorem()">Lorem Ipsum</button>
            <button onclick="genPassword()">Strong Password</button>
        </div>
        <pre id="genOutput"></pre>
    </section>

    <section class="tab-content" id="api">
        <input type="text" id="apiUrl" placeholder="https://api.example.com/data">
        <div class="btn-group">
            <button id="sendBtn">Send API Request</button>
            <button onclick="decodeJWT()">Decode JWT</button>
        </div>
        <pre id="apiOutput"></pre>
    </section>

    <section class="tab-content" id="diff">
        <div class="diff-container">
            <textarea id="diffA" placeholder="Original text..."></textarea>
            <textarea id="diffB" placeholder="Changed text..."></textarea>
        </div>
        <button onclick="compareText()">Compare (Diff)</button>
        <pre id="diffOutput"></pre>
    </section>

</main>
<script src="script.js"></script>
</body>
</html>
