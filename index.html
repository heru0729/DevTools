<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="commandPalette" class="modal">
    <div class="modal-content">
        <div class="search-header">
            <input type="text" id="toolSearch" placeholder="Search Tools... (Ctrl+K)" autofocus>
        </div>
        <div id="searchResult" class="custom-scroll"></div>
    </div>
</div>

<div class="app-shell">
    <aside class="side-nav">
        <div class="app-logo">DP</div>
        <nav class="icon-menu">
            <button class="icon-btn active" data-cat="data" title="Format">📦</button>
            <button class="icon-btn" data-cat="security" title="Security">🔐</button>
            <button class="icon-btn" data-cat="frontend" title="Frontend">🎨</button>
            <button class="icon-btn" data-cat="utils" title="Utilities">🛠️</button>
        </nav>
        <div class="side-bottom">
            <button id="langSwitcher" class="tool-tip-trigger">EN</button>
            <button id="themeSwitcher">🌗</button>
        </div>
    </aside>

    <aside class="sub-nav">
        <div class="sub-nav-header" id="catLabel">DATA MAGIC</div>
        <div id="toolList" class="tool-list custom-scroll"></div>
        
        <div class="ad-space sidebar-ad">
            <div class="ad-label">ADVERTISEMENT</div>
            <div class="ad-content">Your Ad Here</div>
        </div>
    </aside>

    <main class="main-stage">
        <header class="stage-header">
            <div class="tool-info">
                <h1 id="activeToolName">JSON Formatter</h1>
                <p id="activeToolDesc">Prettify and validate JSON data structures.</p>
            </div>
            <div class="stage-actions" id="toolActions"></div>
        </header>

        <div class="workspace">
            <div class="editor-pane">
                <div class="pane-header">INPUT</div>
                <textarea id="mainInput" placeholder="Paste your data here..."></textarea>
            </div>
            
            <div class="editor-pane">
                <div class="pane-header">OUTPUT</div>
                <div class="output-wrapper">
                    <div id="imageContainer"></div>
                    <pre><code id="mainOutput" class="custom-scroll"></code></pre>
                    <button class="copy-btn" id="copyBtn">Copy Result</button>
                </div>
            </div>
        </div>

        <div class="ad-space footer-ad">
            <div class="ad-content">Banner Ad Space - 728x90</div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
