<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Ultra | Gentle & Powerful</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark"> <div class="app-layout">
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon">🛠️</span>
            <span class="logo-text">DevTools <span>Ultra</span></span>
        </div>
        <nav class="nav-menu">
            <button class="nav-item active" data-tab="json-xml">📦 データ整形</button>
            <button class="nav-item" data-tab="sql-text">📝 テキスト・SQL</button>
            <button class="nav-item" data-tab="crypto-hash">🔐 暗号・エンコード</button>
            <button class="nav-item" data-tab="convert-type">🔄 変換・型生成</button>
            <button class="nav-item" data-tab="time-unit">⏰ 時間・ネットワーク</button>
            <button class="nav-item" data-tab="generator">🎲 生成ツール</button>
            <button class="nav-item" data-tab="security-jwt">🎫 JWT・認証</button>
            <button class="nav-item" data-tab="diff-tool">⚖️ 比較(Diff)</button>
            <button class="nav-item" data-tab="client-info">💻 ブラウザ情報</button>
        </nav>
        <div class="sidebar-footer">
            <button id="themeToggle" class="theme-btn">🌙 ダークモード</button>
        </div>
    </aside>

    <main class="main-content">
        <section class="panel active" id="json-xml">
            <header class="panel-header">
                <h2>データ整形 <small>JSON / XML / YAML / CSV</small></h2>
                <div class="action-group">
                    <button class="primary" onclick="processJSON('format')">きれいに整列</button>
                    <button onclick="processJSON('minify')">1行に圧縮</button>
                    <button onclick="jsonToYaml()">YAMLへ変換</button>
                    <button onclick="csvToJson()">CSVをJSONへ</button>
                </div>
            </header>
            <div class="editor-grid">
                <textarea id="mainInput" class="custom-scroll" placeholder="ここにデータを貼り付けてください..."></textarea>
                <div class="output-container">
                    <pre><code id="mainOutput" class="language-json"></code></pre>
                    <button class="copy-btn" onclick="copyResult('mainOutput')">コピー</button>
                </div>
            </div>
        </section>

        </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="script.js"></script>
</body>
</html>
