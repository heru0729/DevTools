<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevTools Pro</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9619368699008291" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <style>
        :root {
            --bg: #0c0c0e; --sidebar: #141418; --panel: #1c1c22;
            --accent: #818cf8; --border: #27272a; --text: #f4f4f5; --text-dim: #71717a;
        }
        body.light {
            --bg: #ffffff; --sidebar: #f2f2f5; --panel: #ffffff;
            --border: #e4e4e7; --text: #09090b; --text-dim: #71717a; --accent: #4f46e5;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .app-shell { display: flex; height: 100vh; width: 100vw; }

        /* --- 1. Rail (PC Left) --- */
        .nav-rail { width: 72px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; flex-shrink: 0; }
        .rail-btn { width: 48px; height: 48px; border-radius: 12px; border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--text-dim); margin-bottom: 15px; }
        .rail-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.3); }

        /* --- 2. Sidebar (PC Tool Selection) --- */
        .tool-sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-title { padding: 25px 20px 10px; font-size: 11px; font-weight: 800; color: var(--text-dim); letter-spacing: 0.1em; }
        .tool-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tool-item { width: 100%; padding: 12px 15px; border: none; background: transparent; color: var(--text-dim); text-align: left; cursor: pointer; border-radius: 10px; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .tool-item.active { background: var(--panel); color: var(--accent); }

        /* --- 3. Workspace (Main Area) --- */
        .workspace { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .workspace-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header-title h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .header-title p { margin: 4px 0 0; font-size: 13px; color: var(--text-dim); }

        .editor-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; background: var(--border); gap: 1px; min-height: 0; }
        .pane { background: var(--bg); display: flex; flex-direction: column; position: relative; }
        .pane-label { padding: 10px 20px; font-size: 11px; font-weight: 800; color: var(--text-dim); border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.02); }

        textarea { flex: 1; width: 100%; background: transparent; border: none; color: var(--text); padding: 25px; font-family: 'JetBrains Mono', monospace; font-size: 14px; resize: none; outline: none; line-height: 1.6; }
        .output-wrapper { flex: 1; overflow: auto; position: relative; }
        pre { margin: 0; padding: 25px; }
        .copy-btn { position: absolute; top: 15px; right: 25px; background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; z-index: 10; }

        .btn-run { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2); }
        .btn-theme { width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; margin-top: auto; }

        /* --- Responsive (Mobile) --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .app-shell { flex-direction: column; height: auto; }
            .nav-rail { width: 100%; height: 65px; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); padding: 0 15px; position: sticky; top: 0; z-index: 1000; }
            .rail-btn { margin-bottom: 0; margin-right: 10px; }
            .btn-theme { margin-top: 0; margin-left: auto; }
            .tool-sidebar { width: 100%; border-right: none; }
            .tool-list { display: flex; overflow-x: auto; white-space: nowrap; padding: 10px; }
            .tool-item { width: auto; margin-right: 8px; }
            .editor-grid { display: block; height: auto; }
            .pane { min-height: 400px; border-bottom: 1px solid var(--border); }
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="dark">

<div class="app-shell">
    <nav class="nav-rail">
        <button class="rail-btn active" data-cat="data">📦</button>
        <button class="rail-btn" data-cat="security">🔐</button>
        <button class="rail-btn" data-cat="frontend">🎨</button>
        <button class="rail-btn" data-cat="utils">🛠️</button>
        <button id="themeToggle" class="btn-theme">🌙</button>
    </nav>

    <aside class="tool-sidebar">
        <div class="sidebar-title">TOOLS</div>
        <div id="toolList" class="tool-list custom-scroll"></div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div class="header-title">
                <h1 id="toolName">JSON Format</h1>
                <p id="toolDesc">JSONをパースして見やすく整形します</p>
            </div>
            <button class="btn-run" onclick="execute()">RUN (Ctrl+Enter)</button>
        </header>

        <div class="editor-grid">
            <div class="pane">
                <div class="pane-label">INPUT</div>
                <textarea id="input" spellcheck="false" placeholder="ここにデータを入力..."></textarea>
            </div>
            <div class="pane">
                <div class="pane-label">OUTPUT</div>
                <div class="output-wrapper custom-scroll">
                    <div id="qrCode" style="padding: 20px; display: none;"></div>
                    <pre><code id="output" class="hljs"></code></pre>
                    <button class="copy-btn" onclick="copyResult()">COPY</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const TOOLS = [
        { id: 'json', cat: 'data', name: 'JSON Format', desc: 'Prettify and validate JSON data' },
        { id: 'sql', cat: 'data', name: 'SQL Format', desc: 'Format and beautify SQL queries' },
        { id: 'b64e', cat: 'security', name: 'Base64 Encode', desc: 'Encode text to Base64 string' },
        { id: 'b64d', cat: 'security', name: 'Base64 Decode', desc: 'Decode Base64 back to text' },
        { id: 'sha256', cat: 'security', name: 'SHA-256', desc: 'Generate secure hash' },
        { id: 'qr', cat: 'frontend', name: 'QR Code', desc: 'Generate QR image from text' },
        { id: 'uuid', cat: 'utils', name: 'UUID Generator', desc: 'Generate unique identifier' }
    ];

    let state = { cat: 'data', tool: 'json' };

    function init() {
        document.querySelectorAll('.rail-btn').forEach(btn => {
            btn.onclick = () => {
                state.cat = btn.dataset.cat;
                state.tool = TOOLS.find(t => t.cat === state.cat).id;
                render();
            };
        });

        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('light');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
        };

        render();
    }

    function render() {
        // Rail active
        document.querySelectorAll('.rail-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === state.cat));
        
        // Tool list
        const list = document.getElementById('toolList');
        list.innerHTML = "";
        TOOLS.filter(t => t.cat === state.cat).forEach(t => {
            const btn = document.createElement('button');
            btn.className = `tool-item ${state.tool === t.id ? 'active' : ''}`;
            btn.textContent = t.name;
            btn.onclick = () => { state.tool = t.id; render(); };
            list.appendChild(btn);
        });

        // Workspace header
        const active = TOOLS.find(t => t.id === state.tool);
        document.getElementById('toolName').textContent = active.name;
        document.getElementById('toolDesc').textContent = active.desc;
        
        // Load saved input
        document.getElementById('input').value = localStorage.getItem(`pro_${state.tool}`) || "";
    }

    function execute() {
        const input = document.getElementById('input').value;
        const out = document.getElementById('output');
        const qrBox = document.getElementById('qrCode');
        qrBox.style.display = 'none';
        out.textContent = "";

        localStorage.setItem(`pro_${state.tool}`, input);

        try {
            let res = "";
            if (state.tool === 'json') res = JSON.stringify(JSON.parse(input), null, 4);
            if (state.tool === 'sql') res = sqlFormatter.format(input);
            if (state.tool === 'b64e') res = btoa(unescape(encodeURIComponent(input)));
            if (state.tool === 'b64d') res = decodeURIComponent(escape(atob(input)));
            if (state.tool === 'sha256') res = CryptoJS.SHA256(input).toString();
            if (state.tool === 'uuid') res = crypto.randomUUID();
            if (state.tool === 'qr') {
                const qr = qrcode(0, 'M'); qr.addData(input); qr.make();
                qrBox.innerHTML = qr.createImgTag(6);
                qrBox.style.display = 'block';
            }

            out.textContent = res;
            if(res) hljs.highlightElement(out);
        } catch (e) { out.textContent = "Error: " + e.message; }
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('output').textContent);
    }

    window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'Enter') execute(); });
    window.onload = init;
</script>

</body>
</html>
