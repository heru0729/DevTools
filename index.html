<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevTools Pro - Professional Edition</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9619368699008291" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="app-shell">
    <nav class="nav-rail">
        <button class="rail-btn active" data-cat="data">📦</button>
        <button class="rail-btn" data-cat="security">🔐</button>
        <button class="rail-btn" data-cat="frontend">🎨</button>
        <button class="rail-btn" data-cat="utils">🛠️</button>
        <div class="rail-spacer"></div>
        <button id="themeToggle" class="btn-theme">🌙</button>
    </nav>

    <aside class="tool-sidebar">
        <div class="sidebar-title">ALL TOOLS</div>
        <div id="toolList" class="tool-list custom-scroll"></div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div class="header-title">
                <h1 id="toolName">---</h1>
                <p id="toolDesc">---</p>
            </div>
            <div class="header-actions">
                <button class="btn-run" onclick="execute()">RUN (Ctrl+Enter)</button>
            </div>
        </header>

        <div class="editor-grid">
            <div class="pane">
                <div class="pane-header">INPUT</div>
                <textarea id="input" spellcheck="false" placeholder="ここに貼り付けてください..."></textarea>
            </div>
            <div class="pane output-pane">
                <div class="pane-header">
                    <span>OUTPUT</span>
                    <button class="btn-mini-copy" onclick="copyResult()">Copy Result</button>
                </div>
                <div class="output-viewer custom-scroll">
                    <div id="imageResult" class="image-center"></div>
                    <pre><code id="outputText" class="hljs"></code></pre>
                </div>
            </div>
        </div>

        <div class="ad-footer">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9619368699008291" data-ad-slot="6699940875" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
