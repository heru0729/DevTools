<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="commandPalette" class="modal">
    <div class="modal-content">
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="toolSearch" placeholder="Search tools or commands..." autofocus>
        </div>
        <div id="searchResult" class="custom-scroll"></div>
    </div>
</div>

<div class="app-shell">
    <nav class="nav-rail">
        <div class="brand">PRO</div>
        <div class="nav-group">
            <button class="rail-btn active" data-cat="data" title="Formatter">📦</button>
            <button class="rail-btn" data-cat="security" title="Security">🔐</button>
            <button class="rail-btn" data-cat="frontend" title="Frontend">🎨</button>
            <button class="rail-btn" data-cat="utils" title="Utilities">🛠️</button>
        </div>
        <div class="rail-footer">
            <button id="langSwitcher" class="ghost-btn">EN</button>
            <button id="themeSwitcher" class="ghost-btn">🌗</button>
        </div>
    </nav>

    <aside class="tool-sidebar">
        <div class="sidebar-header" id="catLabel">DATA MAGIC</div>
        <div id="toolList" class="tool-list custom-scroll"></div>
        
        <div class="ad-card">
            <div class="ad-tag">SPONSORED</div>
            <div class="ad-box">Your Tool Ad</div>
        </div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div class="title-area">
                <h1 id="activeToolName">JSON Formatter</h1>
                <p id="activeToolDesc">Validate and beautify JSON code.</p>
            </div>
            <div class="action-bar" id="toolActions"></div>
        </header>

        <section class="editor-grid">
            <div class="editor-container">
                <div class="editor-label" id="labelInput">INPUT</div>
                <textarea id="mainInput" placeholder="Paste source here..."></textarea>
            </div>
            
            <div class="editor-container">
                <div class="editor-label" id="labelOutput">OUTPUT</div>
                <div class="output-viewer">
                    <div id="imageContainer" class="preview-box"></div>
                    <pre><code id="mainOutput" class="custom-scroll"></code></pre>
                    <button id="copyBtn" class="fab-copy">Copy</button>
                </div>
            </div>
        </section>

        <div class="footer-ad-bar">
            <div class="ad-tag">AD</div>
            <div class="ad-banner">Premium Developers Tools - Try Pro Subscription Today</div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
