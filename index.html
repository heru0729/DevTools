<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevTools Pro</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9619368699008291" crossorigin="anonymous"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="app-shell">
    <nav class="nav-rail">
        <div class="brand">PRO</div>
        <div class="nav-group">
            <button class="rail-btn active" data-cat="data">📦</button>
            <button class="rail-btn" data-cat="security">🔐</button>
            <button class="rail-btn" data-cat="frontend">🎨</button>
            <button class="rail-btn" data-cat="utils">🛠️</button>
        </div>
        <div class="rail-footer">
            <button id="langSwitcher" class="control-btn">EN</button>
            <button id="themeSwitcher" class="control-btn">🌙</button>
        </div>
    </nav>

    <aside class="tool-sidebar">
        <div class="sidebar-header" id="catLabel">DATA MAGIC</div>
        <div id="toolList" class="tool-list custom-scroll"></div>

        <div class="ad-container sidebar-ad">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9619368699008291"
                 data-ad-slot="YOUR_AD_SLOT_HERE"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div class="title-area">
                <h1 id="activeToolName">---</h1>
                <p id="activeToolDesc">---</p>
            </div>
            <div class="action-bar" id="toolActions"></div>
        </header>

        <section class="editor-grid">
            <div class="editor-container">
                <div class="editor-label" id="labelInput">INPUT</div>
                <textarea id="mainInput" spellcheck="false" placeholder="Paste source here..."></textarea>
            </div>
            <div class="editor-container">
                <div class="editor-label" id="labelOutput">OUTPUT</div>
                <div class="output-viewer">
                    <div id="imageContainer" class="preview-box"></div>
                    <pre><code id="mainOutput" class="custom-scroll"></code></pre>
                    <button id="copyBtn" class="fab-copy">Copy</button>
                </div>
            </div>
        </section>
        
        <div class="ad-container footer-ad">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:728px;height:90px"
                 data-ad-client="ca-pub-9619368699008291"
                 data-ad-slot="YOUR_AD_SLOT_HERE"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
