<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevTools Pro</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9619368699008291" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" id="hljs-theme">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="app-shell">
    <nav class="nav-rail">
        <button class="rail-btn active" data-cat="data">📦</button>
        <button class="rail-btn" data-cat="security">🔐</button>
        <button class="rail-btn" data-cat="frontend">🎨</button>
        <button class="rail-btn" data-cat="utils">🛠️</button>
        <div class="rail-spacer"></div>
        <button id="themeSwitcher" class="control-btn">🌙</button>
    </nav>

    <aside class="tool-sidebar">
        <div class="sidebar-label">TOOLS</div>
        <div id="toolList" class="tool-list"></div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div class="title-info">
                <h1 id="activeToolName">---</h1>
                <p id="activeToolDesc">---</p>
            </div>
            <div id="toolActions" class="actions"></div>
        </header>

        <div class="editor-grid">
            <div class="editor-pane">
                <div class="pane-header">INPUT</div>
                <textarea id="mainInput" placeholder="Paste source here..."></textarea>
            </div>
            <div class="editor-pane">
                <div class="pane-header">OUTPUT</div>
                <div class="output-wrapper">
                    <div id="imageOutput" class="img-box"></div>
                    <pre><code id="mainOutput" class="custom-scroll"></code></pre>
                    <button id="copyBtn" class="copy-fab">COPY</button>
                </div>
            </div>
        </div>

        <div class="ad-footer">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9619368699008291" data-ad-slot="6699940875" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
