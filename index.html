<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevTools Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.3.1/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9619368699008291"
     crossorigin="anonymous"></script>
</head>
<body class="dark">

<div class="app-shell">
    <nav class="nav-rail">
        <div class="rail-group">
            <button class="rail-btn active" onclick="setCat('data')">📦</button>
            <button class="rail-btn" onclick="setCat('security')">🔐</button>
            <button class="rail-btn" onclick="setCat('utils')">🛠️</button>
        </div>
        <div class="rail-spacer"></div>
        <button id="langBtn" class="control-btn" onclick="toggleLang()">EN</button>
        <button class="control-btn" onclick="document.body.classList.toggle('light')">🌓</button>
    </nav>

    <aside class="tool-sidebar">
        <div class="sidebar-title" id="lbl-tools">TOOLS</div>
        <div id="toolList" class="tool-list"></div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div class="header-title">
                <h1 id="toolName">JSON Format</h1>
                <p id="toolDesc">---</p>
            </div>
            <button class="btn-run" id="lbl-run" onclick="execute()">RUN</button>
        </header>

        <div class="editor-grid">
            <div class="pane">
                <div class="pane-header" id="lbl-input">INPUT</div>
                <textarea id="input" spellcheck="false" placeholder="Paste data here..."></textarea>
            </div>
            <div class="pane">
                <div class="pane-header">
                    <span id="lbl-output">OUTPUT</span>
                    <button class="btn-mini-copy" id="lbl-copy" onclick="copyResult()">COPY</button>
                </div>
                <div id="imageResult" class="image-center"></div>
                <pre id="outputPre"><code id="outputText" class="hljs"></code></pre>
            </div>
        </div>
    </main>
</div>
<script src="script.js"></script>
</body>
</html>
